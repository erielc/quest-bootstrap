name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-gnu
            ext: ".exe"

    steps:
      - uses: actions/checkout@v5
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - run: cargo build --release --target ${{ matrix.target }}
        working-directory: quest-bootstrap

      - name: Rename and package binary
        shell: bash
        run: |
          BINARY_NAME="quest-bootstrap"
          TARGET_DIR="quest-bootstrap/target/${{ matrix.target }}/release"
          SRC_BIN="${TARGET_DIR}/${BINARY_NAME}${{ matrix.ext }}"
          
          # Set executable permission for Unix targets
          if [ "${{ matrix.os }}" != "windows-latest" ]; then
            chmod +x "$SRC_BIN"
          fi
          
          # Create compressed archives to preserve permissions/file types on download
          if [ "${{ matrix.os }}" == "windows-latest" ]; then
            ARCHIVE_NAME="quest-bootstrap-${{ matrix.target }}.zip"
            powershell -Command "Compress-Archive -Path '$SRC_BIN' -DestinationPath '$ARCHIVE_NAME' -Force"
          elif [ "${{ matrix.os }}" == "macos-latest" ]; then
            ARCHIVE_NAME="quest-bootstrap-${{ matrix.target }}.zip"
            mkdir -p bin_temp
            # Renaming to .command allows macOS users to run the binary by double-clicking it
            cp "$SRC_BIN" "bin_temp/${BINARY_NAME}.command"
            chmod +x "bin_temp/${BINARY_NAME}.command"
            zip -j "$ARCHIVE_NAME" "bin_temp/${BINARY_NAME}.command"
            rm -rf bin_temp
          else
            ARCHIVE_NAME="quest-bootstrap-${{ matrix.target }}.tar.gz"
            mkdir -p bin_temp
            cp "$SRC_BIN" "bin_temp/$BINARY_NAME"
            chmod +x "bin_temp/$BINARY_NAME"
            tar -czf "$ARCHIVE_NAME" -C bin_temp "$BINARY_NAME"
            rm -rf bin_temp
          fi
          
          # Rename the raw binary for direct download
          mv "$SRC_BIN" "quest-bootstrap-${{ matrix.target }}${{ matrix.ext }}"
          if [ "${{ matrix.os }}" != "windows-latest" ]; then
            chmod +x "quest-bootstrap-${{ matrix.target }}${{ matrix.ext }}"
          fi

      - uses: actions/upload-artifact@v5
        with:
          name: quest-bootstrap-${{ matrix.target }}
          path: |
            quest-bootstrap-${{ matrix.target }}${{ matrix.ext }}
            quest-bootstrap-${{ matrix.target }}*.tar.gz
            quest-bootstrap-${{ matrix.target }}*.zip
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets

      - run: find release-assets -type f -exec mv -v {} . \;

      - uses: softprops/action-gh-release@v3
        with:
          files: quest-bootstrap-*
